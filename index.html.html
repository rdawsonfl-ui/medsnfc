<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedsNFC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0F1A;--surface:#161C2E;--card:#1A2238;
  --border:rgba(255,255,255,0.09);--white:#FFFFFF;
  --offwhite:#EDEBF5;--muted:#9398B5;
  --teal:#00C4A7;--teal-dim:rgba(0,196,167,0.14);
  --gold:#F0A500;--red:#E05656;
}
body{background:var(--bg);color:var(--offwhite);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;font-size:18px}
button{font-family:inherit}
.app{max-width:500px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(12,15,26,0.97);backdrop-filter:blur(14px);z-index:50}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--white)}
.logo span{color:var(--teal)}
.gear{background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px}

.patient{flex:1;display:flex;flex-direction:column;padding:26px 22px 50px;animation:fade .4s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* period switcher — big tabs */
.periods{display:flex;gap:8px;margin-bottom:26px}
.periods button{flex:1;background:var(--surface);border:2px solid var(--border);color:var(--muted);border-radius:16px;padding:16px 4px;font-size:16px;font-weight:700;cursor:pointer}
.periods button .t{display:block;font-size:13px;font-weight:600;margin-top:4px;opacity:.8}
.periods button.active{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}

.greet{text-align:center;font-size:19px;color:var(--muted);font-weight:500}
.title{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,12vw,64px);color:var(--white);line-height:1;letter-spacing:1px;margin:6px 0 8px}
.due{text-align:center;font-size:17px;color:var(--muted);margin-bottom:28px}
.due b{color:var(--teal);font-weight:700}

.big-tap{width:100%;border:none;cursor:pointer;color:#08120F;background:linear-gradient(180deg,#1FE0BE,#00C4A7);border-radius:30px;padding:44px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 18px 40px -12px rgba(0,196,167,.5);transition:transform .12s}
.big-tap:active{transform:scale(.97)}
.big-tap .glyph{font-size:60px;line-height:1}
.big-tap .label{font-size:28px;font-weight:700}

.remind{margin:18px auto 0;display:block;background:transparent;border:none;color:var(--muted);font-size:18px;font-weight:600;cursor:pointer;padding:10px}

.done{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px 0}
.done-ring{width:124px;height:124px;border-radius:50%;background:var(--teal-dim);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:66px;font-weight:800;box-shadow:0 0 0 14px rgba(0,196,167,.07)}
.done-msg{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--white);letter-spacing:1px}
.done-time{font-size:19px;color:var(--teal);font-weight:700}
.undo{background:transparent;border:none;color:var(--muted);text-decoration:underline;font-size:16px;cursor:pointer}

.meds{margin-top:34px}
.meds-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.meds-h .lbl{font-size:15px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700}
.pill-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--border)}
.pill-row:last-child{border-bottom:none}
.pill-dot{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--surface);border:2px solid var(--border);color:var(--muted)}
.pill-row.on .pill-dot{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.pill-name{font-size:19px;color:var(--white);font-weight:600}
.pill-meta{font-size:15px;color:var(--muted);margin-top:2px}
.pill-edit{margin-left:auto;background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:6px 10px}

.add-med{width:100%;margin-top:18px;background:var(--surface);border:2px dashed var(--border);color:var(--teal);border-radius:18px;padding:20px;font-size:19px;font-weight:700;cursor:pointer}
.add-med:active{transform:scale(.99)}

.week{display:flex;gap:7px;margin-top:30px}
.wd{flex:1;text-align:center;padding:12px 0;border-radius:12px;border:2px solid var(--border);background:var(--surface)}
.wd .d{font-size:13px;font-weight:700;color:var(--muted)}
.wd .m{font-size:18px;font-weight:800;height:22px;color:var(--muted)}
.wd.taken{background:var(--teal-dim);border-color:var(--teal)}.wd.taken .m{color:var(--teal)}
.wd.today{box-shadow:0 0 0 2px rgba(0,196,167,.45)}

/* modal for add/edit med */
.modal-bg{position:fixed;inset:0;background:rgba(8,10,18,.78);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fade .2s}
.modal{background:var(--card);width:100%;max-width:500px;border-radius:26px 26px 0 0;padding:28px 24px calc(28px + env(safe-area-inset-bottom));border:1px solid var(--border)}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--white);letter-spacing:1px;margin-bottom:20px}
.fld{margin-bottom:18px}
.fld label{display:block;font-size:14px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.fld input,.fld select{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:16px;color:var(--white);font-size:19px;font-family:inherit}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--teal)}
.modal-save{width:100%;background:var(--teal);color:#08120F;border:none;border-radius:16px;padding:18px;font-size:20px;font-weight:700;cursor:pointer;margin-top:6px}
.modal-del{width:100%;background:transparent;color:var(--red);border:none;padding:16px;font-size:17px;font-weight:600;cursor:pointer;margin-top:6px}
.modal-cancel{width:100%;background:transparent;color:var(--muted);border:none;padding:12px;font-size:17px;cursor:pointer}

.foot{text-align:center;font-size:14px;color:var(--muted);padding:22px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--card);border:2px solid var(--teal);color:var(--white);padding:14px 24px;border-radius:30px;font-size:16px;font-weight:700;opacity:0;transition:all .3s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;padding:80px 20px}
.err{background:rgba(224,86,86,.12);border:1px solid rgba(224,86,86,.3);color:#f0a6a6;border-radius:14px;padding:18px;font-size:16px;margin:18px;line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">Meds<span>NFC</span></div>
    <button class="gear" onclick="toggleCare()" title="Caregiver view">👁</button>
  </div>
  <div id="view"><div class="loading">Loading…</div></div>
  <div class="foot" id="foot"></div>
</div>
<div id="modalHost"></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL="https://ogyqghrcybkwxxxevdlz.supabase.co";
const SUPABASE_KEY="sb_publishable_BSF_8zpvls7hG6R7dkehPw_Mgz02T0w";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const dayKey=(d=new Date())=>d.toISOString().slice(0,10);
const fmt=iso=>new Date(iso).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
const currentTag=()=>new URLSearchParams(location.search).get("tag")||"rich-morning";

let careView=false; // caregiver layer off by default — solo patient is primary
let state={tag:null,patient:null,meds:[],doses:[],periods:[],loading:true,error:null};

async function loadAll(){
  const tagId=currentTag();
  state.loading=true;state.error=null;render();
  try{
    const {data:tag,error:te}=await sb.from("medsnfc_tags").select("*, medsnfc_patients(*)").eq("id",tagId).single();
    if(te)throw te;
    if(!tag){state.error=`No tag "${tagId}" found.`;state.loading=false;render();return;}
    const {data:meds}=await sb.from("medsnfc_meds").select("*").eq("tag_id",tagId).order("sort_order");
    const since=new Date();since.setDate(since.getDate()-6);
    const {data:doses}=await sb.from("medsnfc_doses").select("*").eq("tag_id",tagId).gte("dose_date",dayKey(since));
    const {data:sibs}=await sb.from("medsnfc_tags").select("id,dose_group,due_label").eq("patient_id",tag.patient_id);
    const ord={Morning:1,Afternoon:2,Bedtime:3,Evening:3};
    state.tag=tag;state.patient=tag.medsnfc_patients;state.meds=meds||[];state.doses=doses||[];
    state.periods=(sibs||[]).sort((a,b)=>(ord[a.dose_group]||9)-(ord[b.dose_group]||9));
    state.loading=false;render();
  }catch(e){console.error(e);state.error="Couldn't reach the database. Check your connection and refresh.";state.loading=false;render();}
}

const doseToday=()=>state.doses.find(x=>x.dose_date===dayKey())||null;

async function takeDose(){
  if(doseToday())return;
  try{
    const {data,error}=await sb.from("medsnfc_doses").insert({tag_id:state.tag.id,dose_date:dayKey()}).select().single();
    if(error)throw error;
    state.doses.push(data);toast("Saved · "+fmt(data.taken_at));render();
  }catch(e){console.error(e);toast("Save failed — try again");}
}
async function undoDose(){
  const r=doseToday();if(!r)return;
  try{await sb.from("medsnfc_doses").delete().eq("id",r.id);state.doses=state.doses.filter(x=>x.id!==r.id);render();}
  catch(e){toast("Couldn't undo");}
}

function switchPeriod(id){const u=new URL(location.href);u.searchParams.set("tag",id);history.replaceState(null,"",u);loadAll();}
function toggleCare(){careView=!careView;render();toast(careView?"Caregiver view":"My meds");}

/* ---- add / edit meds (patient controls own meds) ---- */
function openAdd(){showModal({mode:"add"});}
function openEdit(m){showModal({mode:"edit",med:m});}
function showModal(opts){
  const isEdit=opts.mode==="edit";const m=opts.med||{};
  document.getElementById("modalHost").innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>${isEdit?"Edit medication":"Add a medication"}</h3>
      <div class="fld"><label>Medication name</label>
        <input id="mName" placeholder="e.g. Lisinopril 10mg" value="${(m.name||'').replace(/"/g,'&quot;')}"></div>
      <div class="fld"><label>Note (optional)</label>
        <input id="mMeta" placeholder="e.g. Blood pressure" value="${(m.meta||'').replace(/"/g,'&quot;')}"></div>
      <button class="modal-save" onclick="saveMed(${isEdit?`'${m.id}'`:"null"})">${isEdit?"Save changes":"Add it"}</button>
      ${isEdit?`<button class="modal-del" onclick="removeMed('${m.id}')">Delete this medication</button>`:""}
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;
}
function closeModal(){document.getElementById("modalHost").innerHTML="";}
async function saveMed(id){
  const name=document.getElementById("mName").value.trim();
  const meta=document.getElementById("mMeta").value.trim();
  if(!name){toast("Enter a name");return;}
  try{
    if(id){
      await sb.from("medsnfc_meds").update({name,meta}).eq("id",id);
    }else{
      await sb.from("medsnfc_meds").insert({tag_id:state.tag.id,name,meta,sort_order:state.meds.length+1});
    }
    closeModal();await loadAll();toast("Saved");
  }catch(e){console.error(e);toast("Couldn't save");}
}
async function removeMed(id){
  try{await sb.from("medsnfc_meds").delete().eq("id",id);closeModal();await loadAll();toast("Removed");}
  catch(e){toast("Couldn't remove");}
}

function toast(t){const e=document.getElementById("toast");e.textContent=t;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),2000);}
const greet=()=>{const h=new Date().getHours();return h<12?"Good morning":h<18?"Good afternoon":"Good evening";};
function hist7(){const o=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const r=state.doses.find(x=>x.dose_date===dayKey(d));o.push({date:d,taken:!!r,time:r?r.taken_at:null});}return o;}

function render(){
  const f=document.getElementById("foot");
  const v=document.getElementById("view");
  if(state.loading){v.innerHTML='<div class="loading">Loading…</div>';f.textContent="";return;}
  if(state.error){v.innerHTML=`<div class="err">${state.error}</div>`;return;}
  v.innerHTML=renderPatient();
  f.textContent = careView ? "Caregiver view — tap the eye to return to your meds" : "Tap the eye icon for caregiver view";
}

function renderPatient(){
  const t=state.tag,done=!!doseToday(),rec=doseToday();
  const periodBtns=state.periods.map(p=>`<button class="${p.id===t.id?'active':''}" onclick="switchPeriod('${p.id}')">${p.dose_group}<span class="t">${p.due_label||''}</span></button>`).join("");
  const hist=hist7().reverse();
  const strip=hist.map(h=>{const today=h.date.toDateString()===new Date().toDateString();
    return `<div class="wd ${h.taken?'taken':''} ${today?'today':''}"><div class="d">${DAYS[h.date.getDay()]}</div><div class="m">${h.taken?'✓':today?'•':''}</div></div>`;}).join("");

  // caregiver glance (only when toggled)
  let careBlock="";
  if(careView){
    const taken=hist.filter(h=>h.taken).length;let streak=0;for(const h of hist7()){if(h.taken)streak++;else break;}
    careBlock=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:24px">
      <div style="font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:12px">Caregiver glance</div>
      <div style="display:flex;gap:10px;text-align:center">
        <div style="flex:1"><div style="font-family:'Bebas Neue';font-size:34px;color:var(--teal)">${taken}/7</div><div style="font-size:13px;color:var(--muted)">days taken</div></div>
        <div style="flex:1"><div style="font-family:'Bebas Neue';font-size:34px;color:var(--teal)">${streak}</div><div style="font-size:13px;color:var(--muted)">day streak</div></div>
        <div style="flex:1"><div style="font-family:'Bebas Neue';font-size:34px;color:var(--white)">${Math.round(taken/7*100)}%</div><div style="font-size:13px;color:var(--muted)">on track</div></div>
      </div></div>`;
  }

  const action=done?`
    <div class="done"><div class="done-ring">✓</div><div class="done-msg">All done</div>
      <div class="done-time">Taken at ${fmt(rec.taken_at)}</div>
      <button class="undo" onclick="undoDose()">undo</button></div>`:`
    <button class="big-tap" onclick="takeDose()"><span class="glyph">✓</span><span class="label">I took them</span></button>
    <button class="remind" onclick="toast('Okay — check back soon')">⏰ Remind me later</button>`;

  const meds=state.meds.length?state.meds.map(m=>`
    <div class="pill-row ${done?'on':''}">
      <div class="pill-dot">${done?'✓':'○'}</div>
      <div><div class="pill-name">${m.name}</div>${m.meta?`<div class="pill-meta">${m.meta}</div>`:''}</div>
      <button class="pill-edit" onclick='openEdit(${JSON.stringify(m).replace(/'/g,"&#39;")})'>✎</button>
    </div>`).join(""):`<div style="color:var(--muted);text-align:center;padding:18px">No medications here yet. Add your first below.</div>`;

  return `<div class="patient">
    ${state.periods.length>1?`<div class="periods">${periodBtns}</div>`:''}
    ${careBlock}
    <div class="greet">${greet()}</div>
    <div class="title">${t.dose_group} meds</div>
    <div class="due">${done?'Logged for today':'Due at <b>'+(t.due_label||'')+'</b>'}</div>
    ${action}
    <div class="meds">
      <div class="meds-h"><span class="lbl">${t.dose_group} · ${state.meds.length} medication${state.meds.length!==1?'s':''}</span></div>
      ${meds}
      <button class="add-med" onclick="openAdd()">+ Add a medication</button>
    </div>
    <div class="week">${strip}</div>
  </div>`;
}

loadAll();
</script>
</body>
</html>
